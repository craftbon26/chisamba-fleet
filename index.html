<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fleet Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Mobile-first responsive design */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Login Form */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .login-card h2 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        /* Dashboard Styles */
        .dashboard {
            display: none;
        }
        
        .navbar {
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            color: #333;
            width: auto;
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .content-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
        }
        
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }
        
        /* Tables */
        .table-responsive {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* Date Filter */
        .date-filter {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        
        .date-filter input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        /* Mobile Menu */
        .mobile-menu-toggle {
            display: none;
            background: none;
            font-size: 24px;
            width: auto;
            padding: 5px 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .mobile-menu-toggle {
                display: block;
            }
            
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
            }
            
            .nav-links.show {
                display: flex;
            }
            
            .nav-btn {
                width: 100%;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Status Badges */
        .status-badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-available {
            background: #4caf50;
            color: white;
        }
        
        .status-in-use {
            background: #ff9800;
            color: white;
        }
        
        .status-maintenance {
            background: #f44336;
            color: white;
        }
        
        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <h2>Fleet Management System</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                <a href="#" onclick="showRegister()">Register New Account</a>
            </p>
        </div>
    </div>
    
    <!-- Registration Form -->
    <div id="registerContainer" class="login-container" style="display: none;">
        <div class="login-card">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="input-group">
                    <label>Role</label>
                    <select id="regRole">
                        <option value="driver">Driver</option>
                        <option value="mechanic">Mechanic</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit">Register</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                <a href="#" onclick="showLogin()">Back to Login</a>
            </p>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="container">
            <div class="navbar">
                <h2>Fleet Management</h2>
                <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
                <div class="nav-links" id="navLinks">
                    <button class="nav-btn" onclick="showSection('dashboard')">Dashboard</button>
                    <button class="nav-btn" onclick="showSection('vehicles')">Vehicles</button>
                    <button class="nav-btn" onclick="showSection('trips')">Trips</button>
                    <button class="nav-btn" onclick="showSection('maintenance')">Maintenance</button>
                    <button class="nav-btn" onclick="showSection('reports')">Reports</button>
                    <button class="nav-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <!-- Dashboard Section -->
            <div id="dashboardSection" class="content-section active">
                <div class="cards-grid" id="statsCards">
                    <!-- Stats will be loaded here -->
                </div>
                <div id="availabilityCalendar">
                    <h3>Vehicle Availability</h3>
                    <div id="availabilityList"></div>
                </div>
            </div>
            
            <!-- Vehicles Section -->
            <div id="vehiclesSection" class="content-section">
                <h3>Vehicle Management</h3>
                <button onclick="showAddVehicleForm()" style="width: auto; margin-bottom: 20px;">+ Add Vehicle</button>
                <div id="addVehicleForm" style="display: none;" class="form-grid">
                    <input type="text" id="vehiclePlate" placeholder="Plate Number">
                    <input type="text" id="vehicleModel" placeholder="Model">
                    <input type="number" id="vehicleYear" placeholder="Year">
                    <input type="text" id="vehicleFuelType" placeholder="Fuel Type">
                    <input type="number" id="vehicleCostPerKm" placeholder="Cost per KM" step="0.01">
                    <button onclick="addVehicle()">Save Vehicle</button>
                </div>
                <div class="table-responsive">
                    <table id="vehiclesTable">
                        <thead>
                            <tr><th>Plate</th><th>Model</th><th>Year</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <!-- Trips Section -->
            <div id="tripsSection" class="content-section">
                <h3>Book a Trip</h3>
                <form id="tripForm" class="form-grid">
                    <select id="tripVehicleId" required></select>
                    <input type="text" id="tripDriverName" placeholder="Driver Name" required>
                    <input type="date" id="tripStartDate" required>
                    <input type="date" id="tripEndDate" required>
                    <input type="text" id="tripPurpose" placeholder="Purpose" required>
                    <input type="number" id="tripStartOdometer" placeholder="Start Odometer" required>
                    <button type="submit">Book Trip</button>
                </form>
                <div class="table-responsive">
                    <h4>Active Trips</h4>
                    <table id="tripsTable">
                        <thead><tr><th>Vehicle</th><th>Driver</th><th>Start Date</th><th>End Date</th><th>Status</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <!-- Maintenance Section -->
            <div id="maintenanceSection" class="content-section">
                <h3>Maintenance Records</h3>
                <form id="maintenanceForm" class="form-grid">
                    <select id="maintenanceVehicleId" required></select>
                    <select id="maintenanceType">
                        <option value="oil">Oil Change</option>
                        <option value="tires">Tire Rotation</option>
                        <option value="brakes">Brake Service</option>
                        <option value="engine">Engine Repair</option>
                        <option value="other">Other</option>
                    </select>
                    <input type="number" id="maintenanceCost" placeholder="Cost" step="0.01" required>
                    <input type="date" id="maintenanceDate" required>
                    <textarea id="maintenanceDescription" placeholder="Description"></textarea>
                    <button type="submit">Add Maintenance</button>
                </form>
                <div class="table-responsive">
                    <table id="maintenanceTable">
                        <thead><tr><th>Vehicle</th><th>Type</th><th>Cost</th><th>Date</th><th>Description</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <!-- Reports Section -->
            <div id="reportsSection" class="content-section">
                <h3>Generate Reports</h3>
                <div class="date-filter">
                    <input type="date" id="reportStartDate">
                    <input type="date" id="reportEndDate">
                    <select id="reportType">
                        <option value="usage">Usage Report</option>
                        <option value="maintenance">Maintenance Report</option>
                        <option value="costs">Cost Report</option>
                    </select>
                    <button onclick="generateReport()">Generate Report</button>
                    <button onclick="emailReport()">Email Report</button>
                </div>
                <div id="reportOutput"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyPwiKpD7MymR-QMbDuiBx7V9uSKQl1WcRET8b3hTVpz8C06DgLLZ7O02aE3v3JPY6-/exec';
        let currentUser = null;
        let authToken = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
            document.getElementById('tripForm').addEventListener('submit', handleBookTrip);
            document.getElementById('maintenanceForm').addEventListener('submit', handleAddMaintenance);
        });
        
        // Authentication Functions
        function checkLoginStatus() {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('currentUser');
            if (token && user) {
                authToken = token;
                currentUser = JSON.parse(user);
                showDashboard();
                loadDashboardData();
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            showLoading();
            
            try {
                const response = await fetch(`${API_URL}?action=login&email=${email}&password=${password}`);
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.data.token;
                    currentUser = data.data.user;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showDashboard();
                    loadDashboardData();
                } else {
                    showAlert('Login failed: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            
            try {
                const response = await fetch(`${API_URL}?action=register&name=${name}&email=${email}&password=${password}&role=${role}`);
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Registration successful! Please login.', 'success');
                    showLogin();
                } else {
                    showAlert('Registration failed: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        // Dashboard Functions
        async function loadDashboardData() {
            await loadVehicles();
            await loadTrips();
            await loadMaintenance();
            await loadStats();
            await checkVehicleAvailability();
        }
        
        async function loadVehicles() {
            try {
                const response = await fetch(`${API_URL}?action=getVehicles&token=${authToken}`);
                const data = await response.json();
                
                if (data.success) {
                    displayVehicles(data.data);
                    populateVehicleSelects(data.data);
                }
            } catch (error) {
                console.error('Error loading vehicles:', error);
            }
        }
        
        function displayVehicles(vehicles) {
            const tbody = document.querySelector('#vehiclesTable tbody');
            tbody.innerHTML = '';
            
            vehicles.forEach(vehicle => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${vehicle.plateNumber}</td>
                    <td>${vehicle.model}</td>
                    <td>${vehicle.year}</td>
                    <td><span class="status-badge status-${vehicle.status.replace('-', '')}">${vehicle.status}</span></td>
                    <td>
                        ${currentUser.role === 'admin' ? 
                            `<button onclick="editVehicle(${vehicle.id})" style="width: auto; margin-right: 5px;">Edit</button>
                             <button onclick="deleteVehicle(${vehicle.id})" style="width: auto;">Delete</button>` : 
                            ''}
                    </td>
                `;
            });
        }
        
        async function addVehicle() {
            const plateNumber = document.getElementById('vehiclePlate').value;
            const model = document.getElementById('vehicleModel').value;
            const year = document.getElementById('vehicleYear').value;
            const fuelType = document.getElementById('vehicleFuelType').value;
            const costPerKm = document.getElementById('vehicleCostPerKm').value;
            
            try {
                const response = await fetch(`${API_URL}?action=addVehicle&token=${authToken}&plateNumber=${plateNumber}&model=${model}&year=${year}&fuelType=${fuelType}&costPerKm=${costPerKm}`);
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Vehicle added successfully!', 'success');
                    loadVehicles();
                    document.getElementById('addVehicleForm').style.display = 'none';
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        async function loadTrips() {
            try {
                const response = await fetch(`${API_URL}?action=getTrips&token=${authToken}`);
                const data = await response.json();
                
                if (data.success) {
                    displayTrips(data.data);
                }
            } catch (error) {
                console.error('Error loading trips:', error);
            }
        }
        
        function displayTrips(trips) {
            const tbody = document.querySelector('#tripsTable tbody');
            tbody.innerHTML = '';
            
            trips.forEach(trip => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${trip.vehicleId}</td>
                    <td>${trip.driverName}</td>
                    <td>${new Date(trip.startDate).toLocaleDateString()}</td>
                    <td>${new Date(trip.endDate).toLocaleDateString()}</td>
                    <td><span class="status-badge">${trip.status}</span></td>
                `;
            });
        }
        
        async function handleBookTrip(e) {
            e.preventDefault();
            const vehicleId = document.getElementById('tripVehicleId').value;
            const driverName = document.getElementById('tripDriverName').value;
            const startDate = document.getElementById('tripStartDate').value;
            const endDate = document.getElementById('tripEndDate').value;
            const purpose = document.getElementById('tripPurpose').value;
            const startOdometer = document.getElementById('tripStartOdometer').value;
            
            try {
                const response = await fetch(`${API_URL}?action=addTrip&token=${authToken}&vehicleId=${vehicleId}&driverName=${driverName}&startDate=${startDate}&endDate=${endDate}&purpose=${purpose}&startOdometer=${startOdometer}`);
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Trip booked successfully!', 'success');
                    loadTrips();
                    document.getElementById('tripForm').reset();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        async function loadMaintenance() {
            try {
                const response = await fetch(`${API_URL}?action=getMaintenance&token=${authToken}`);
                const data = await response.json();
                
                if (data.success) {
                    displayMaintenance(data.data);
                }
            } catch (error) {
                console.error('Error loading maintenance:', error);
            }
        }
        
        function displayMaintenance(maintenance) {
            const tbody = document.querySelector('#maintenanceTable tbody');
            tbody.innerHTML = '';
            
            maintenance.forEach(record => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${record.vehicleId}</td>
                    <td>${record.maintenanceType}</td>
                    <td>$${record.cost}</td>
                    <td>${new Date(record.date).toLocaleDateString()}</td>
                    <td>${record.description}</td>
                `;
            });
        }
        
        async function handleAddMaintenance(e) {
            e.preventDefault();
            const vehicleId = document.getElementById('maintenanceVehicleId').value;
            const maintenanceType = document.getElementById('maintenanceType').value;
            const cost = document.getElementById('maintenanceCost').value;
            const date = document.getElementById('maintenanceDate').value;
            const description = document.getElementById('maintenanceDescription').value;
            
            try {
                const response = await fetch(`${API_URL}?action=addMaintenance&token=${authToken}&vehicleId=${vehicleId}&maintenanceType=${maintenanceType}&cost=${cost}&date=${date}&description=${description}`);
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Maintenance record added!', 'success');
                    loadMaintenance();
                    document.getElementById('maintenanceForm').reset();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}?action=getReports&token=${authToken}&reportType=costs`);
                const data = await response.json();
                
                if (data.success) {
                    const statsHtml = `
                        <div class="stat-card">
                            <h3>Total Vehicles</h3>
                            <div class="value">${document.querySelectorAll('#vehiclesTable tbody tr').length}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Active Trips</h3>
                            <div class="value">${document.querySelectorAll('#tripsTable tbody tr').length}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Total Maintenance Cost</h3>
                            <div class="value">$${data.data.totalMaintenanceCost.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Total Cost (All Time)</h3>
                            <div class="value">$${data.data.totalCost.toFixed(2)}</div>
                        </div>
                    `;
                    document.getElementById('statsCards').innerHTML = statsHtml;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function checkVehicleAvailability() {
            const today = new Date().toISOString().split('T')[0];
            const nextWeek = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
            
            try {
                const response = await fetch(`${API_URL}?action=checkAvailability&startDate=${today}&endDate=${nextWeek}`);
                const data = await response.json();
                
                if (data.success) {
                    const availabilityHtml = data.data.map(vehicle => `
                        <div style="padding: 10px; margin: 5px; background: #f5f5f5; border-radius: 8px;">
                            <strong>${vehicle.plateNumber}</strong> - ${vehicle.model} 
                            <span class="status-badge status-available">Available</span>
                        </div>
                    `).join('');
                    document.getElementById('availabilityList').innerHTML = availabilityHtml || '<p>No vehicles available</p>';
                }
            } catch (error) {
                console.error('Error checking availability:', error);
            }
        }
        
        async function generateReport() {
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            const reportType = document.getElementById('reportType').value;
            
            try {
                const response = await fetch(`${API_URL}?action=getReports&token=${authToken}&reportType=${reportType}&startDate=${startDate}&endDate=${endDate}`);
                const data = await response.json();
                
                if (data.success) {
                    displayReport(data.data, reportType);
                } else {
                    showAlert('Error generating report', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        function displayReport(report, type) {
            let html = '';
            
            if (type === 'usage') {
                html = '<h4>Usage Report</h4><table><thead><tr><th>Vehicle</th><th>Driver</th><th>Distance (km)</th><th>Purpose</th></tr></thead><tbody>';
                report.forEach(trip => {
                    html += `<tr><td>${trip.vehicleId}</td><td>${trip.driverName}</td><td>${trip.distance}</td><td>${trip.purpose}</td></tr>`;
                });
                html += '</tbody></table>';
            } else if (type === 'maintenance') {
                html = '<h4>Maintenance Report</h4><table><thead><tr><th>Vehicle</th><th>Type</th><th>Cost</th><th>Date</th></tr></thead><tbody>';
                report.forEach(record => {
                    html += `<tr><td>${record.vehicleId}</td><td>${record.type}</td><td>$${record.cost}</td><td>${new Date(record.date).toLocaleDateString()}</td></tr>`;
                });
                html += '</tbody></table>';
            } else if (type === 'costs') {
                html = `
                    <h4>Cost Report (${new Date(report.startDate).toLocaleDateString()} - ${new Date(report.endDate).toLocaleDateString()})</h4>
                    <div class="cards-grid">
                        <div class="stat-card"><h3>Maintenance Cost</h3><div class="value">$${report.totalMaintenanceCost.toFixed(2)}</div></div>
                        <div class="stat-card"><h3>Fuel Cost</h3><div class="value">$${report.totalFuelCost.toFixed(2)}</div></div>
                        <div class="stat-card"><h3>Total Cost</h3><div class="value">$${report.totalCost.toFixed(2)}</div></div>
                    </div>
                `;
            }
            
            document.getElementById('reportOutput').innerHTML = html;
        }
        
        async function emailReport() {
            const reportHtml = document.getElementById('reportOutput').innerHTML;
            const subject = `Fleet Report - ${new Date().toLocaleDateString()}`;
            
            try {
                const response = await fetch(`${API_URL}?action=sendNotification&token=${authToken}&email=${currentUser.email}&subject=${subject}&body=${encodeURIComponent(reportHtml)}`);
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Report sent to your email!', 'success');
                } else {
                    showAlert('Error sending email', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }
        
        function populateVehicleSelects(vehicles) {
            const tripSelect = document.getElementById('tripVehicleId');
            const maintSelect = document.getElementById('maintenanceVehicleId');
            
            tripSelect.innerHTML = '<option value="">Select Vehicle</option>';
            maintSelect.innerHTML = '<option value="">Select Vehicle</option>';
            
            vehicles.forEach(vehicle => {
                tripSelect.innerHTML += `<option value="${vehicle.id}">${vehicle.plateNumber} - ${vehicle.model}</option>`;
                maintSelect.innerHTML += `<option value="${vehicle.id}">${vehicle.plateNumber} - ${vehicle.model}</option>`;
            });
        }
        
        // UI Functions
        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('registerContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('registerContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
        }
        
        function showRegister() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('registerContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
        
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${section}Section`).classList.add('active');
            
            if (section === 'dashboard') {
                loadDashboardData();
            } else if (section === 'vehicles') {
                loadVehicles();
            } else if (section === 'trips') {
                loadTrips();
            } else if (section === 'maintenance') {
                loadMaintenance();
            }
        }
        
        function showAddVehicleForm() {
            const form = document.getElementById('addVehicleForm');
            form.style.display = form.style.display === 'none' ? 'grid' : 'none';
        }
        
        function toggleMobileMenu() {
            document.getElementById('navLinks').classList.toggle('show');
        }
        
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            showLogin();
        }
        
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            document.querySelector('.container').prepend(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function showLoading() {
            // Implement loading indicator if needed
        }
        
        // Admin-only functions
        function editVehicle(id) {
            // Implement edit functionality
            alert('Edit vehicle ' + id);
        }
        
        async function deleteVehicle(id) {
            if (confirm('Are you sure you want to delete this vehicle?')) {
                try {
                    const response = await fetch(`${API_URL}?action=deleteVehicle&token=${authToken}&vehicleId=${id}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        showAlert('Vehicle deleted successfully!', 'success');
                        loadVehicles();
                    } else {
                        showAlert('Error: ' + data.message, 'error');
                    }
                } catch (error) {
                    showAlert('Network error: ' + error.message, 'error');
                }
            }
        }
    </script>
